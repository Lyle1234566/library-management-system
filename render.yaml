services:
  - type: web
    name: salazar-library-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py ensure_admin_user && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: salazar-library-db
          property: connectionString
      - key: USE_X_FORWARDED_PROTO
        value: "true"
      - key: SERVE_MEDIA_FILES
        value: "true"
      - key: MEDIA_ROOT
        value: /tmp/salazar-library-media
      - key: DB_CONN_MAX_AGE
        value: "60"
      - key: DB_CONN_HEALTH_CHECKS
        value: "true"
      - key: LATE_FEE_PER_DAY
        value: "100.00"
      - key: LIBRARY_WEB_URL
        sync: false
      - key: PASSWORD_RESET_WEB_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_FULL_NAME
        value: Render Admin
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
databases:
  - name: salazar-library-db
    plan: free
